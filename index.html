<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى رنيم - شفق الألحان</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050214;
            --aurora-1: #00ffcc;
            --aurora-2: #ff00ff;
            --aurora-3: #4a00e0;
            --text-glow: #ffb6ff;
            --water-base: #02010a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Tajawal', sans-serif;
            color: white;
            perspective: 1000px;
        }

        /* --- Parallax Layers --- */
        #scene {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            transform-style: preserve-3d;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            will-change: transform;
        }

        /* 1. Sky & Stars */
        .sky-bg {
            background: radial-gradient(circle at top, #11082f 0%, var(--bg-dark) 100%);
            z-index: 1;
        }

        /* 2. The Aurora Borealis */
        .aurora-container {
            z-index: 2;
            overflow: hidden;
            opacity: 0.6;
            mix-blend-mode: screen;
        }

        .aurora {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 80%;
            background: linear-gradient(45deg, var(--aurora-1), var(--aurora-2), var(--aurora-3), transparent);
            filter: blur(60px);
            animation: auroraWave 15s infinite alternate ease-in-out;
            border-radius: 50%;
            transform-origin: center;
        }

        .aurora:nth-child(2) {
            background: linear-gradient(-45deg, #00f2fe, #4facfe, #f093fb, transparent);
            animation-duration: 20s;
            animation-direction: alternate-reverse;
            opacity: 0.8;
            top: -10%;
        }

        @keyframes auroraWave {
            0% { transform: scale(1) rotate(0deg) translateY(0); opacity: 0.4; }
            50% { transform: scale(1.2) rotate(5deg) translateY(20px); opacity: 0.8; }
            100% { transform: scale(1.1) rotate(-5deg) translateY(-20px); opacity: 0.5; }
        }

        /* 3. Mountain Silhouettes */
        .mountains {
            z-index: 3;
            bottom: 35%;
            top: auto;
            height: 30%;
            background: 
                linear-gradient(to bottom, transparent 0%, var(--water-base) 100%),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg"><path d="M0,200 L0,100 L100,50 L250,150 L400,20 L550,120 L750,40 L900,140 L1000,80 L1000,200 Z" fill="%23050214" opacity="0.8"/></svg>') bottom center / cover no-repeat;
        }

        /* 4. The Magic Lake */
        .lake {
            z-index: 4;
            top: 65%;
            height: 35%;
            background: linear-gradient(to bottom, #0a0620 0%, var(--water-base) 100%);
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .lake-reflection {
            position: absolute;
            top: 0;
            left: -10%;
            width: 120%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255, 0, 255, 0.2), rgba(0, 255, 204, 0.1), transparent);
            filter: blur(10px);
            opacity: 0.5;
            mask-image: repeating-linear-gradient(transparent, transparent 5px, black 6px, black 12px);
            -webkit-mask-image: repeating-linear-gradient(transparent, transparent 5px, black 6px, black 12px);
            animation: waterRipples 4s infinite linear;
        }

        @keyframes waterRipples {
            from { background-position: 0 0; }
            to { background-position: 0 24px; }
        }

        /* 5. Falling Petals Canvas */
        #petals-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* --- Content & Typography --- */
        .content-wrapper {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .poetry-box {
            text-align: center;
            width: 90%;
            max-width: 850px;
            margin-top: -15vh;
            pointer-events: auto;
        }

        .name-title {
            font-family: 'Aref Ruqaa', serif;
            font-size: 7rem;
            color: #fff;
            text-shadow: 
                0 0 20px #fff,
                0 0 40px var(--text-glow),
                0 0 80px var(--aurora-2);
            margin-bottom: 25px;
            opacity: 0;
            filter: blur(20px);
            transform: scale(1.2);
            animation: cinematicReveal 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 1s;
        }

        .poetry-text {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            line-height: 2;
            color: #f8fafc;
            text-shadow: 0 2px 15px rgba(0,0,0,1), 0 0 20px rgba(255, 182, 255, 0.4);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .poetry-line {
            opacity: 0;
            filter: blur(10px);
            transform: translateY(20px);
        }

        /* Staggered Cinematic Reveal for Lines */
        .line-1 { animation: lineReveal 2.5s ease forwards 3.5s; }
        .line-2 { animation: lineReveal 2.5s ease forwards 6.0s; }
        .line-3 { animation: lineReveal 2.5s ease forwards 8.5s; }
        .line-4 { animation: lineReveal 2.5s ease forwards 11.0s; }
        .line-5 { animation: lineReveal 2.5s ease forwards 13.5s; }
        .line-6 { animation: lineReveal 2.5s ease forwards 16.0s; }

        @keyframes cinematicReveal {
            to { opacity: 1; filter: blur(0); transform: scale(1); }
        }

        @keyframes lineReveal {
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        /* --- Controls & Signature --- */
        .controls {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 50;
            pointer-events: auto;
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(255, 0, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .pulse-orb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--aurora-1);
            box-shadow: 0 0 10px var(--aurora-1), 0 0 20px var(--aurora-1);
            animation: pulseGlow 1.5s infinite alternate;
        }

        .pulse-orb.paused {
            animation: none;
            background: #555;
            box-shadow: none;
        }

        @keyframes pulseGlow {
            from { transform: scale(0.8); opacity: 0.6; }
            to { transform: scale(1.2); opacity: 1; }
        }

        .signature-box {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            pointer-events: auto;
            text-align: center;
            opacity: 0;
            /* Appears magically after all poetry */
            animation: cinematicReveal 4s ease forwards 19s; 
        }

        .sig-pre {
            font-family: 'Tajawal', sans-serif;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .sig-name {
            font-family: 'Aref Ruqaa', serif;
            font-size: 2.2rem;
            background: linear-gradient(to right, #fff, var(--text-glow), var(--aurora-1));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 182, 255, 0.4);
            position: relative;
            display: inline-block;
        }

        .sig-name::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--aurora-1), transparent);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .name-title { font-size: 5rem; }
            .poetry-text { font-size: 1.3rem; line-height: 1.8; }
            .poetry-box { margin-top: -20vh; }
        }

    </style>
</head>
<body>

    <!-- Audio Control -->
    <div class="controls">
        <button class="glass-btn" onclick="toggleAudio()" id="audioBtn">
            <div class="pulse-orb paused" id="mIcon"></div>
            <span id="btnText">إيقاظ الألحان</span>
        </button>
    </div>

    <!-- Hidden Audio Element (Epic Romantic Strings/Piano) -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/10/14/audio_9939f792cb.mp3?filename=romantic-piano-and-strings-122464.mp3" type="audio/mpeg">
    </audio>

    <!-- 3D Parallax Scene -->
    <div id="scene">
        <!-- Layer 1: Sky -->
        <div class="layer sky-bg" data-speed="0.02"></div>
        
        <!-- Layer 2: Aurora Borealis -->
        <div class="layer aurora-container" data-speed="0.04">
            <div class="aurora"></div>
            <div class="aurora"></div>
        </div>

        <!-- Layer 3: Mountains -->
        <div class="layer mountains" data-speed="0.06"></div>

        <!-- Layer 4: Magic Lake -->
        <div class="layer lake" data-speed="0.08">
            <div class="lake-reflection"></div>
        </div>
    </div>

    <!-- Layer 5: Falling Soft Petals (Canvas) -->
    <canvas id="petals-canvas"></canvas>

    <!-- Typography & Poetry -->
    <div class="content-wrapper">
        <div class="poetry-box">
            <h1 class="name-title">رنـيـم</h1>
            <div class="poetry-text">
                <span class="poetry-line line-1">يا أجمل الألحان التي عُزفت على أوتار الروح..</span>
                <span class="poetry-line line-2">في صوتكِ، يتنفس النبض وتستكين الأيام،</span>
                <span class="poetry-line line-3">وتهمس النجوم لبعضها عن سر هذا الرنيم الساحر.</span>
                <span class="poetry-line line-4">أنتِ النغمة التي تلامس القلب بحنان بالغ،</span>
                <span class="poetry-line line-5">في تفاصيلكِ، تختبئ كل معاني السحر والجمال،</span>
                <span class="poetry-line line-6">لتكوني أنتِ.. سيمفونية حياتي الأجمل.</span>
            </div>
        </div>
    </div>

    <!-- Creator Signature -->
    <div class="signature-box">
        <div class="sig-pre">بكل حُب، من إعداد</div>
        <div class="sig-name">قيس جازي</div>
    </div>

    <script>
        // --- Audio Logic ---
        const music = document.getElementById('bgMusic');
        const btnText = document.getElementById('btnText');
        const mIcon = document.getElementById('mIcon');
        let isPlaying = false;

        function toggleAudio() {
            if (isPlaying) {
                music.pause();
                btnText.innerText = "إيقاظ الألحان";
                mIcon.classList.add('paused');
                isPlaying = false;
            } else {
                music.volume = 0.6;
                music.play().catch(e => console.log("Audio play failed"));
                btnText.innerText = "الألحان تعزف";
                mIcon.classList.remove('paused');
                isPlaying = true;
            }
        }

        // --- Advanced Parallax Effect ---
        const scene = document.getElementById('scene');
        const layers = document.querySelectorAll('.layer');
        
        let mouseX = 0;
        let mouseY = 0;
        let currentX = 0;
        let currentY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2);
            mouseY = (e.clientY - window.innerHeight / 2);
        });

        // Smooth parallax animation loop
        function animateParallax() {
            currentX += (mouseX - currentX) * 0.05; // Ease factor
            currentY += (mouseY - currentY) * 0.05;

            layers.forEach(layer => {
                const speed = layer.getAttribute('data-speed');
                const x = currentX * speed;
                const y = currentY * speed;
                layer.style.transform = `translate3d(${x}px, ${y}px, 0)`;
            });

            requestAnimationFrame(animateParallax);
        }
        animateParallax();

        // --- Soft Glowing Petals Canvas (Sakura Effect) ---
        const canvas = document.getElementById('petals-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let petals = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Petal {
            constructor() {
                this.reset();
                this.y = Math.random() * height; // Initial random spawn
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -20;
                this.size = Math.random() * 4 + 2;
                
                // Soft pinks, purples, and whites
                const colors = ['#ffb6ff', '#ffffff', '#e0c3fc', '#8ec5fc'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.05;
                
                this.opacity = Math.random() * 0.5 + 0.3;
            }

            update() {
                this.y += this.speedY;
                
                // Swaying motion
                this.angle += this.spin;
                this.x += Math.sin(this.angle) * 0.5 + this.speedX;

                // Mouse interaction (gentle wind effect)
                let dx = mouseX + (window.innerWidth/2) - this.x;
                let dy = mouseY + (window.innerHeight/2) - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < 150) {
                    this.x -= (dx / distance) * 2;
                    this.y -= (dy / distance) * 0.5;
                }

                if (this.y > height + 20) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;

                // Draw a soft petal shape (Bezier curves)
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(this.size, -this.size, this.size*2, 0);
                ctx.quadraticCurveTo(this.size, this.size, 0, 0);
                ctx.fill();

                ctx.restore();
            }
        }

        function initPetals() {
            petals = [];
            const numPetals = window.innerWidth < 768 ? 40 : 80; // Optimize for mobile
            for (let i = 0; i < numPetals; i++) {
                petals.push(new Petal());
            }
        }

        function animatePetals() {
            ctx.clearRect(0, 0, width, height);
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });
            requestAnimationFrame(animatePetals);
        }

        initPetals();
        animatePetals();

        // Create glowing burst on click
        window.addEventListener('click', (e) => {
            const burstX = e.clientX;
            const burstY = e.clientY;
            
            for(let i=0; i<10; i++) {
                let p = new Petal();
                p.x = burstX;
                p.y = burstY;
                p.speedY = (Math.random() - 0.5) * 5;
                p.speedX = (Math.random() - 0.5) * 5;
                petals.push(p);
            }
            
            // Remove excess petals after a while to keep performance good
            setTimeout(() => {
                if(petals.length > 100) petals.splice(80, petals.length - 80);
            }, 3000);
        });

    </script>
</body>
</html>
